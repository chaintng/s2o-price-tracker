service: s2o-fetcher

frameworkVersion: "4"

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-southeast-1
  environment:
    SUPABASE_URL: ${env:SUPABASE_URL}
    SUPABASE_SERVICE_ROLE_KEY: ${env:SUPABASE_SERVICE_ROLE_KEY}

plugins:
  - serverless-plugin-typescript

functions:
  fetchPrices:
    handler: src/index.handler
    timeout: 30
    events:
      - schedule:
          rate: rate(1 hour)
          enabled: true
          description: "Fetch S2O resale ticket prices every hour"
